<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>体重日记 · 本地版</title>
    <!-- 使用 Chart.js 轻量图表 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #e5e7eb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
        }
        /* 移动卡片容器 */
        #app {
            max-width: 400px;
            width: 100%;
            background-color: white;
            border-radius: 32px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 20px 16px 30px;
            margin: 0 auto;
        }
        /* 设置页 / 主界面切换 */
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        /* 排版 */
        .text-center { text-align: center; }
        .text-sm { font-size: 0.875rem; color: #6b7280; }
        .text-xs { font-size: 0.75rem; }
        .font-bold { font-weight: 600; }
        .mt-4 { margin-top: 20px; }
        .mb-2 { margin-bottom: 8px; }
        .mt-2 { margin-top: 8px; }
        .flex { display: flex; align-items: center; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .gap-2 { gap: 8px; }
        /* 表单 */
        .input-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 5px;
            color: #1f2937;
        }
        input, .file-input-label {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 24px;
            font-size: 1rem;
            background: #f9fafb;
            transition: 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            background: white;
        }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        /* 滑块定制 */
        .slider-container {
            background: #f3f4f6;
            padding: 16px;
            border-radius: 24px;
            margin: 16px 0;
        }
        .bmi-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 0.7rem;
            color: #4b5563;
        }
        .bmi-labels span { flex: 1; text-align: center; }
        .goal-preview {
            background: #e0f2fe;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            font-weight: 600;
        }
        /* 按钮 */
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            background: #1f2937;
            color: white;
            margin-top: 12px;
        }
        .btn-outline {
            background: white;
            border: 1px solid #d1d5db;
            color: #1f2937;
        }
        .btn-danger {
            background: #dc2626;
            color: white;
        }
        .btn-sm {
            padding: 10px 16px;
            font-size: 0.9rem;
            width: auto;
            margin-top: 0;
        }
        /* 顶部用户栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 48px;
            height: 48px;
            background: #3b82f6;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5rem;
            text-transform: uppercase;
        }
        .menu-btn {
            font-size: 2rem;
            line-height: 1;
            background: none;
            border: none;
            padding: 0 10px;
            cursor: pointer;
            color: #4b5563;
        }
        /* 目标卡片 */
        .goal-card {
            background: linear-gradient(145deg, #2563eb, #1e40af);
            color: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }
        .progress-bar-bg {
            background: rgba(255,255,255,0.3);
            height: 16px;
            border-radius: 30px;
            margin: 12px 0 6px;
        }
        .progress-fill {
            background: white;
            height: 16px;
            border-radius: 30px;
            width: 0%;
            transition: width 0.2s;
        }
        .start-end {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            opacity: 0.9;
        }
        /* 录入区 */
        .entry-area {
            background: #f3f4f6;
            border-radius: 30px;
            padding: 18px;
            margin-bottom: 24px;
        }
        .big-input {
            font-size: 2.5rem;
            text-align: center;
            border: none;
            background: transparent;
            width: 100%;
            font-weight: 300;
            padding: 10px 0;
        }
        .big-input:focus {
            outline: none;
        }
        .hint {
            text-align: center;
            color: #9ca3af;
            font-size: 0.85rem;
        }
        /* 图表容器 */
        .chart-container {
            height: 300px;
            position: relative;
            margin-top: 20px;
        }
        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-overlay.show {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 24px;
            width: 300px;
            text-align: center;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .modal-actions button {
            flex:1; padding: 14px; border-radius: 28px; border: none; font-weight: 600;
        }
        /* 错误提示 */
        .error-toast {
            background: #dc2626;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1100;
            display: none;
        }
        /* 菜单下拉 (简单模拟) */
        .dropdown-menu {
            position: absolute;
            right: 16px;
            top: 70px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            padding: 8px 0;
            width: 160px;
            display: none;
            z-index: 200;
        }
        .dropdown-menu.show {
            display: block;
        }
        .dropdown-menu div {
            padding: 14px 18px;
            cursor: pointer;
        }
        .dropdown-menu div:hover {
            background: #f3f4f6;
        }
    </style>
</head>
<body>
<div id="app">
    <!-- 首次设置页面 -->
    <div id="setupPage" class="page active">
        <h2 class="text-center font-bold" style="font-size: 1.8rem; margin-bottom: 20px;">👋 首次设置</h2>
        <div class="input-group">
            <label>姓名</label>
            <input type="text" id="setupName" placeholder="例如：张三" value="张三">
        </div>
        <div class="input-group">
            <label>身高 (cm)</label>
            <input type="number" id="setupHeight" min="100" max="250" step="1" value="172">
        </div>
        <div class="input-group">
            <label>当前体重 (kg)</label>
            <input type="number" id="setupWeight" min="30" max="200" step="0.1" value="87.6">
        </div>

        <!-- BMI滑块 -->
        <div class="slider-container">
            <div class="flex-between">
                <span>目标BMI: <span id="bmiValue">22.0</span></span>
                <span class="text-sm" id="goalPreview">目标: 65.08 kg</span>
            </div>
            <input type="range" id="bmiSlider" min="18.5" max="28" value="22" step="0.1" style="width:100%; margin: 10px 0;">
            <div class="bmi-labels">
                <span>偏瘦</span><span>正常</span><span>偏胖</span><span>肥胖</span>
            </div>
        </div>

        <button class="btn-outline" id="importBtn">📂 导入已有数据</button>
        <input type="file" id="importFile" accept=".json" style="display: none;">

        <button class="btn" id="startBtn" style="margin-top: 25px;">✅ 开始记录</button>
    </div>

    <!-- 主界面页面 -->
    <div id="mainPage" class="page">
        <!-- 顶部 -->
        <div class="header">
            <div class="user-info">
                <div class="avatar" id="avatar"></div>
                <div>
                    <div id="displayName"></div>
                    <div class="text-xs" id="displayStats"></div>
                </div>
            </div>
            <div style="position: relative;">
                <button class="menu-btn" id="menuToggle">⋯</button>
                <div id="dropdown" class="dropdown-menu">
                    <div id="exportData">📤 导出数据</div>
                    <div id="clearData">🗑️ 清除数据</div>
                </div>
            </div>
        </div>

        <!-- 目标卡片 -->
        <div class="goal-card">
            <div class="flex-between">
                <span>今日目标</span>
                <span style="font-size: 1.8rem; font-weight: 700;" id="todayGoal">-- kg</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
            <div class="start-end">
                <span id="startWeight"></span>
                <span id="targetWeight"></span>
            </div>
        </div>

        <!-- 录入区域 -->
        <div class="entry-area">
            <input type="number" step="any" id="weightInput" class="big-input" placeholder="输入后按回车" autofocus>
            <div class="hint" id="todayCount"></div>
        </div>

        <!-- 图表区域 -->
        <div class="chart-container">
            <canvas id="weightChart" width="400" height="300"></canvas>
        </div>
    </div>

    <!-- 模态框 (清除确认) -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-bottom: 16px;">确认清除？</h3>
            <p class="text-sm" style="margin-bottom: 20px;">所有本地数据将被删除</p>
            <div class="modal-actions">
                <button id="modalCancel" style="background:#e5e7eb;">取消</button>
                <button id="modalConfirm" style="background:#dc2626; color:white;">清除</button>
            </div>
        </div>
    </div>

    <!-- 错误吐司 -->
    <div id="errorToast" class="error-toast"></div>
</div>

<script>
    (function() {
        // ---------- 存储KEY ----------
        const STORAGE_KEY = 'weight_app_data';

        // ---------- 全局变量 ----------
        let appData = null;               // 内存数据
        let chartInstance = null;
        let currentMenuOpen = false;

        // ---------- DOM 元素 ----------
        const setupPage = document.getElementById('setupPage');
        const mainPage = document.getElementById('mainPage');
        const setupName = document.getElementById('setupName');
        const setupHeight = document.getElementById('setupHeight');
        const setupWeight = document.getElementById('setupWeight');
        const bmiSlider = document.getElementById('bmiSlider');
        const bmiValue = document.getElementById('bmiValue');
        const goalPreview = document.getElementById('goalPreview');
        const startBtn = document.getElementById('startBtn');
        const importBtn = document.getElementById('importBtn');
        const importFile = document.getElementById('importFile');
        const avatar = document.getElementById('avatar');
        const displayName = document.getElementById('displayName');
        const displayStats = document.getElementById('displayStats');
        const todayGoal = document.getElementById('todayGoal');
        const progressFill = document.getElementById('progressFill');
        const startWeightSpan = document.getElementById('startWeight');
        const targetWeightSpan = document.getElementById('targetWeight');
        const weightInput = document.getElementById('weightInput');
        const todayCount = document.getElementById('todayCount');
        const menuToggle = document.getElementById('menuToggle');
        const dropdown = document.getElementById('dropdown');
        const exportBtn = document.getElementById('exportData');
        const clearBtn = document.getElementById('clearData');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalCancel = document.getElementById('modalCancel');
        const modalConfirm = document.getElementById('modalConfirm');
        const errorToast = document.getElementById('errorToast');

        // ---------- 辅助函数 ----------
        function showError(msg) {
            errorToast.style.display = 'block';
            errorToast.innerText = msg;
            setTimeout(() => { errorToast.style.display = 'none'; }, 3000);
        }

        // 目标体重递推公式: b = a - (a*0.0008 + 0.14)/2
        function nextGoal(prevGoal) {
            return prevGoal - (prevGoal * 0.0008 + 0.14) / 2;
        }

        // 获取某天的目标体重 (基于起始日期递推)
        function getGoalForDate(targetDate, startDateStr, startGoal) {
            // targetDate: Date, startDateStr: '2026-03-15' 格式, startGoal: 起始体重
            const start = new Date(startDateStr + 'T12:00:00'); // 避免时区偏移
            const target = new Date(targetDate);
            target.setHours(12,0,0,0);
            const daysDiff = Math.round((target - start) / (86400000));
            if (daysDiff <= 0) return startGoal;
            let goal = startGoal;
            for (let i = 0; i < daysDiff; i++) {
                goal = nextGoal(goal);
            }
            return goal;
        }

        // 获取今日日期键 YYYY-MM-DD
        function getTodayKey() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        // 解析日期键为对象
        function parseDateKey(dateStr) {
            const [y,m,d] = dateStr.split('-').map(Number);
            return { y, m, d };
        }

        // 格式化日期用于显示 (m/d)
        function formatMD(dateStr) {
            const [y,m,d] = dateStr.split('-');
            return `${Number(m)}/${Number(d)}`;
        }

        // 保存数据到localStorage
        function persistData() {
            if (appData) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(appData, null, 2));
            }
        }

        // ---------- 核心：检查连续4天无数据 ----------
        function checkAndPurgeIfNeeded() {
            if (!appData) return false;
            // 获取所有已有数据日期 (progress里所有月份所有天)
            const existingDates = new Set();
            if (appData.progress) {
                Object.keys(appData.progress).forEach(monthKey => {
                    const days = appData.progress[monthKey];
                    Object.keys(days).forEach(day => {
                        const dateStr = `${monthKey}-${day.padStart(2,'0')}`;
                        existingDates.add(dateStr);
                    });
                });
            }
            // 从今天往前推4天
            const today = new Date();
            today.setHours(0,0,0,0);
            let allMissing = true;
            for (let i = 0; i < 4; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const year = d.getFullYear();
                const month = String(d.getMonth()+1).padStart(2,'0');
                const day = String(d.getDate()).padStart(2,'0');
                const key = `${year}-${month}-${day}`;
                if (existingDates.has(key)) {
                    allMissing = false;
                    break;
                }
            }
            if (allMissing && existingDates.size > 0) { // 有数据但最近4天缺失
                // 清除所有数据
                localStorage.removeItem(STORAGE_KEY);
                appData = null;
                // 跳转设置页
                showSetupPage();
                setTimeout(() => alert('连续4天未记录，请重新开始'), 100);
                return true;
            }
            return false;
        }

        // ---------- 智能填充 (D+1, D+2 等) ----------
        function fillMissingDays() {
            if (!appData || !appData.progress) return;
            // 提取所有存在的日期
            const allDates = [];
            Object.keys(appData.progress).forEach(month => {
                Object.keys(appData.progress[month]).forEach(day => {
                    const dateStr = `${month}-${day.padStart(2,'0')}`;
                    allDates.push(dateStr);
                });
            });
            allDates.sort(); // 升序

            if (allDates.length === 0) return;

            const startDateStr = allDates[0]; // 起始日期
            const startGoal = appData.goal;    // 其实goal是起始体重? 但需求里起始体重是weight, goal是目标体重, 但是目标体重第一天 = 起始体重
            // 根据数据结构: 第一个值是目标体重, 所以实际上每个日期的数组[0]是当日目标
            // 但我们需要递推目标, 所以用起始体重来算每一天目标

            // 遍历日期, 检查断层
            for (let i = 0; i < allDates.length - 1; i++) {
                const current = allDates[i];
                const next = allDates[i+1];
                const diff = (new Date(next) - new Date(current)) / 86400000;
                if (diff > 1 && diff <= 3) { // 断层2天或3天
                    // 需要填充中间日期
                    const startActual = getAvgWeightForDate(current); // 当前实际平均值
                    const endActual = getAvgWeightForDate(next);       // 下一个实际平均值

                    // 填充日期从 current+1 到 next-1
                    for (let d = 1; d < diff; d++) {
                        const fillDate = new Date(new Date(current).getTime() + d * 86400000);
                        const year = fillDate.getFullYear();
                        const month = String(fillDate.getMonth()+1).padStart(2,'0');
                        const day = String(fillDate.getDate()).padStart(2,'0');
                        const monthKey = `${year}-${month}`;
                        const dayKey = String(fillDate.getDate());

                        // 目标体重：从当前日期的目标递推
                        const currentGoal = getGoalForDate(current, startDateStr, appData.weight); // 其实weight是起始体重
                        // 直接获取fillDate的目标
                        const goalFill = getGoalForDate(fillDate, startDateStr, appData.weight);

                        // 实际体重线性插值
                        const weightStart = startActual;
                        const weightEnd = endActual;
                        const ratio = d / diff;
                        const actualFill = weightStart + (weightEnd - weightStart) * ratio;

                        // 存入
                        if (!appData.progress[monthKey]) appData.progress[monthKey] = {};
                        if (!appData.progress[monthKey][dayKey]) {
                            // 创建数组: [目标, 实际1, 实际2...] 但我们要存平均值? 不, 存单次录入. 这里我们仅填充一个录入值
                            // 但需求说填充的数据同时包含目标体重和实际体重, 所以插入一条实际记录, 目标自动作为第一个元素
                            appData.progress[monthKey][dayKey] = [goalFill, Number(actualFill.toFixed(2))];
                        } else {
                            // 如果已经有数据(不可能), 跳过
                        }
                    }
                }
            }
            // 保存填充结果
            persistData();
        }

        // 获取某天实际体重平均值 (用于计算)
        function getAvgWeightForDate(dateStr) {
            const [year, month, day] = dateStr.split('-');
            const monthKey = `${year}-${month}`;
            const dayKey = String(Number(day)); // 去掉前导0
            const dayData = appData?.progress?.[monthKey]?.[dayKey];
            if (!dayData || dayData.length <= 1) return null;
            const weights = dayData.slice(1); // 第一个是目标
            if (weights.length === 0) return null;
            const sum = weights.reduce((a,b) => a + b, 0);
            return sum / weights.length;
        }

        // ---------- 初始化或加载数据 ----------
        function loadFromStorage() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (parsed && parsed.name && parsed.height && parsed.weight && parsed.goal && parsed.progress) {
                        appData = parsed;
                        // 检查自动清理
                        if (checkAndPurgeIfNeeded()) return false;
                        // 填充断层
                        fillMissingDays();
                        return true;
                    }
                } catch (e) { /* 格式错误忽略 */ }
            }
            return false;
        }

        // 显示设置页
        function showSetupPage() {
            setupPage.classList.add('active');
            mainPage.classList.remove('active');
        }

        // 显示主页
        function showMainPage() {
            setupPage.classList.remove('active');
            mainPage.classList.add('active');
            renderMainUI();
        }

        // 更新滑块预览
        function updateBMIPreview() {
            const bmi = parseFloat(bmiSlider.value);
            bmiValue.innerText = bmi.toFixed(1);
            const heightM = parseFloat(setupHeight.value) / 100;
            const targetWeight = bmi * heightM * heightM;
            goalPreview.innerText = `目标: ${targetWeight.toFixed(2)} kg`;
        }

        // 设置事件
        setupHeight.addEventListener('input', updateBMIPreview);
        bmiSlider.addEventListener('input', updateBMIPreview);
        updateBMIPreview();

        // 导入按钮
        importBtn.addEventListener('click', () => {
            importFile.click();
        });
        importFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const json = JSON.parse(ev.target.result);
                    if (!json.name || !json.height || !json.weight || !json.goal || !json.progress) {
                        throw new Error('缺少必要字段');
                    }
                    appData = json;
                    persistData();
                    showMainPage();
                } catch (err) {
                    alert('导入失败：' + err.message);
                } finally {
                    importFile.value = '';
                }
            };
            reader.readAsText(file);
        });

        // 开始记录
        startBtn.addEventListener('click', () => {
            if (!setupName.value.trim()) { showError('请输入姓名'); return; }
            const h = parseFloat(setupHeight.value);
            const w = parseFloat(setupWeight.value);
            if (h < 100 || h > 250) { showError('身高需100-250cm'); return; }
            if (w < 30 || w > 200) { showError('体重需30-200kg'); return; }
            const bmi = parseFloat(bmiSlider.value);
            const heightM = h / 100;
            const goalWeight = bmi * heightM * heightM;

            // 构建初始数据结构
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth()+1).padStart(2,'0');
            const day = String(today.getDate()).padStart(2,'0');
            const monthKey = `${year}-${month}`;
            const dayKey = String(today.getDate()); // 无前导0

            appData = {
                name: setupName.value.trim(),
                height: h,
                weight: w,
                goal: goalWeight,
                progress: {}
            };
            // 存入今天起始数据: [目标体重, 实际体重]
            // 第一天目标体重 = 起始体重 (w)
            appData.progress[monthKey] = {
                [dayKey]: [w, w]  // 目标为起始体重, 实际也为起始体重
            };

            persistData();
            showMainPage();
        });

        // 渲染主界面
        function renderMainUI() {
            if (!appData) return;

            // 头像
            avatar.innerText = appData.name.charAt(0).toUpperCase();
            displayName.innerText = appData.name;
            displayStats.innerText = `${appData.height}cm · 目标 ${appData.goal.toFixed(2)}kg`;

            // 目标卡片
            const todayKey = getTodayKey();
            const [y,m,d] = todayKey.split('-');
            const monthKey = `${y}-${m}`;
            const dayKey = String(Number(d));

            // 今日目标计算
            const startDate = new Date(Object.keys(appData.progress)[0] + '-01'); // 粗略用第一个月第一天？需要第一个有数据的日期
            let firstDateStr = null;
            outer: for (const mk in appData.progress) {
                for (const dk in appData.progress[mk]) {
                    firstDateStr = `${mk}-${dk.padStart(2,'0')}`;
                    break outer;
                }
            }
            if (!firstDateStr) return;
            const todayGoalVal = getGoalForDate(new Date(todayKey + 'T12:00:00'), firstDateStr, appData.weight);
            todayGoal.innerText = todayGoalVal.toFixed(2) + ' kg';

            // 起始体重、目标体重显示
            startWeightSpan.innerText = `开始: ${appData.weight.toFixed(1)}kg`;
            targetWeightSpan.innerText = `目标: ${appData.goal.toFixed(1)}kg`;

            // 今日实际体重平均值 (用于进度)
            const todayData = appData.progress[monthKey]?.[dayKey];
            let todayAvg = null;
            if (todayData && todayData.length > 1) {
                const vals = todayData.slice(1);
                todayAvg = vals.reduce((s, v) => s + v, 0) / vals.length;
                todayCount.innerText = `今日已记录 ${vals.length} 次`;
            } else {
                todayCount.innerText = '';
            }

            // 进度条: (起始体重 - 当前体重) / (起始体重 - 目标体重)
            const current = todayAvg !== null ? todayAvg : (todayData ? todayData[1] || appData.weight : appData.weight);
            const startW = appData.weight;
            const targetW = appData.goal;
            let percent = 0;
            if (startW !== targetW) {
                percent = Math.min(100, Math.max(0, ((startW - current) / (startW - targetW)) * 100));
            }
            progressFill.style.width = percent + '%';

            // 更新图表
            updateChart();

            // 输入框聚焦
            weightInput.focus();
        }

        // 更新图表
        function updateChart() {
            if (!appData) return;
            // 获取最近7天日期 (从今天倒推)
            const labels = [];
            const chartData = [];
            const chartColors = [];
            const tooltips = [];

            const today = new Date();
            today.setHours(0,0,0,0);
            const firstDateStr = Object.keys(appData.progress).length ? (() => {
                for (const mk in appData.progress) {
                    for (const dk in appData.progress[mk]) {
                        return `${mk}-${dk.padStart(2,'0')}`;
                    }
                }
            })() : null;
            if (!firstDateStr) return;

            // 收集最近7天平均值
            for (let i = 6; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const year = d.getFullYear();
                const month = String(d.getMonth()+1).padStart(2,'0');
                const day = String(d.getDate()).padStart(2,'0');
                const dateKey = `${year}-${month}-${day}`;
                const monthKey = `${year}-${month}`;
                const dayKey = String(d.getDate());
                const dayRec = appData.progress[monthKey]?.[dayKey];

                let avg = null;
                let goalForDay = getGoalForDate(d, firstDateStr, appData.weight);
                if (dayRec && dayRec.length > 1) {
                    const vals = dayRec.slice(1);
                    avg = vals.reduce((s, v) => s + v, 0) / vals.length;
                }
                labels.push(formatMD(dateKey));
                chartData.push(avg);
                if (avg !== null) {
                    chartColors.push(avg <= goalForDay ? '#10b981' : '#ef4444');
                    tooltips.push(`${avg.toFixed(2)}kg (目标: ${goalForDay.toFixed(2)}kg)`);
                } else {
                    chartColors.push('#e5e7eb'); // 灰色空柱子
                    tooltips.push(`无记录 (目标: ${goalForDay.toFixed(2)}kg)`);
                }
            }

            // Y轴范围计算: 取最早有数据的实际体重取整
            let base = 70;
            for (let i = 0; i < chartData.length; i++) {
                if (chartData[i] !== null) {
                    base = Math.round(chartData[i]);
                    break;
                }
            }
            const yMin = base - 2;
            const yMax = base + 1;

            const ctx = document.getElementById('weightChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: chartData,
                        backgroundColor: chartColors,
                        borderRadius: 8,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: (ctx) => tooltips[ctx.dataIndex] || ''
                            }
                        },
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            min: yMin,
                            max: yMax,
                            grid: { stepSize: 0.2, color: '#e5e7eb' },
                            title: { display: true, text: '体重 (kg)' }
                        }
                    },
                    layout: { padding: { top: 20 } }
                }
            });

            // 手动绘制数值标签 (chart.js 没有内置柱顶标签，可以用插件，但这里简化，需求里为可选，可忽略)
        }

        // 保存今日录入
        function saveTodaysWeight(value) {
            if (!appData) return;
            const num = parseFloat(value);
            if (isNaN(num) || num < 30 || num > 200) {
                showError('请输入30-200之间的体重');
                return;
            }
            const rounded = Math.round(num * 100) / 100;

            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth()+1).padStart(2,'0');
            const day = String(today.getDate()).padStart(2,'0');
            const monthKey = `${year}-${month}`;
            const dayKey = String(today.getDate());

            // 确保月份存在
            if (!appData.progress[monthKey]) appData.progress[monthKey] = {};

            // 获取当天目标体重 (基于起始日递推)
            const firstDateStr = (() => {
                for (const mk in appData.progress) {
                    for (const dk in appData.progress[mk]) {
                        return `${mk}-${dk.padStart(2,'0')}`;
                    }
                }
            })();
            const todayGoalVal = getGoalForDate(new Date(today.setHours(12,0,0,0)), firstDateStr, appData.weight);

            if (!appData.progress[monthKey][dayKey]) {
                // 新建: [目标体重, 录入值]
                appData.progress[monthKey][dayKey] = [todayGoalVal, rounded];
            } else {
                // 追加
                appData.progress[monthKey][dayKey].push(rounded);
            }

            persistData();
            // 填充断层 (每次录入后尝试填充)
            fillMissingDays();
            // 重新渲染
            renderMainUI();
            weightInput.value = '';
        }

        // 事件: 回车保存
        weightInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                saveTodaysWeight(weightInput.value);
            }
        });

        // 菜单切换
        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('show');
            currentMenuOpen = !currentMenuOpen;
        });
        document.addEventListener('click', () => {
            dropdown.classList.remove('show');
        });

        // 导出
        exportBtn.addEventListener('click', () => {
            if (!appData) return;
            const dataStr = JSON.stringify(appData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${appData.name}_weight_data.json`;
            a.click();
            URL.revokeObjectURL(url);
            dropdown.classList.remove('show');
        });

        // 清除
        clearBtn.addEventListener('click', () => {
            dropdown.classList.remove('show');
            modalOverlay.classList.add('show');
        });
        modalCancel.addEventListener('click', () => {
            modalOverlay.classList.remove('show');
        });
        modalConfirm.addEventListener('click', () => {
            localStorage.removeItem(STORAGE_KEY);
            appData = null;
            modalOverlay.classList.remove('show');
            showSetupPage();
        });

        // 启动检查
        if (loadFromStorage()) {
            showMainPage();
        } else {
            showSetupPage();
        }
    })();
</script>
</body>
</html>
