<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>体重日记 · 本地健康</title>
    <!-- Bulma + Chart.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f5f9fc; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; padding: 12px; }
        #app { max-width: 600px; width: 100%; margin: 0 auto; }

        .card { border-radius: 24px; box-shadow: 0 12px 24px rgba(0, 20, 10, 0.08); background: white; margin-bottom: 20px; overflow: hidden; border: none; }
        .card-content { padding: 20px; }

        .progress-card { position: relative; border-radius: 28px; overflow: hidden; background-color: #e9eef2; min-height: 200px; display: flex; flex-direction: column; justify-content: space-between; margin-bottom: 20px; isolation: isolate; }
        .progress-fill { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: linear-gradient(145deg, #4cd964, #2cbe6c); transition: width 0.4s ease; z-index: 0; }
        .progress-fill.red-fill { background: linear-gradient(145deg, #ff5e5e, #d03a3a); }
        .progress-content { position: relative; z-index: 2; padding: 22px 20px; color: white; mix-blend-mode: difference; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; text-shadow: 0 0 2px rgba(0,0,0,0.2); }
        .top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 44px; height: 44px; border-radius: 44px; background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4, #a1c4fd); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.6rem; color: #2d3e4f; mix-blend-mode: multiply; }
        .menu-btn { background: transparent; border: none; font-size: 2rem; line-height: 1; cursor: pointer; color: inherit; padding: 0 8px; }
        .weight-row { display: flex; justify-content: space-between; align-items: baseline; margin: 20px 0 12px; }
        .big-weight { font-size: 2.4rem; font-weight: 700; letter-spacing: -1px; }
        .start-goal { opacity: 0.8; font-size: 1rem; }

        .entry-box { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
        .control { flex: 2; min-width: 180px; }
        .today-entries { font-size: 0.95rem; color: #4a5a6a; background: #f0f5fa; border-radius: 40px; padding: 6px 18px; }

        .bmi-slider-labels { display: flex; justify-content: space-between; font-size: 0.8rem; color: #6b7a88; margin: 4px 0 8px; }
        .target-preview { background: #e4f5e7; border-radius: 28px; padding: 20px; text-align: center; margin: 24px 0; }
        .target-preview .big { font-size: 2.8rem; font-weight: 700; color: #2cbe6c; line-height: 1.2; }
        .slider-value { font-weight: 600; }

        .menu-dropdown { position: absolute; top: 60px; right: 20px; background: white; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); padding: 10px 0; width: 180px; z-index: 40; display: none; }
        .menu-dropdown.show { display: block; }
        .menu-item { padding: 14px 22px; cursor: pointer; font-weight: 500; }
        .menu-item:hover { background: #f4f9fd; }

        .modal-card { border-radius: 32px !important; overflow: hidden; }
        .modal-card-body { text-align: center; font-size: 1.2rem; padding: 32px 24px; }
        .buttons { justify-content: center; gap: 16px; }
        .button.is-danger { background: #f14668; color: white; border: none; }

        .is-hidden { display: none !important; }
        hr { margin: 1rem 0; }
        .is-green { color: #2cbe6c; }
        .help { font-size: 0.85rem; }
    </style>
</head>
<body>
<div id="app">
    <!-- 首次设置页 -->
    <div id="setupPage" class="card">
        <div class="card-content">
            <h2 class="title is-4 mb-4">👋 初次见面，请设置</h2>
            <div class="field">
                <label class="label">姓名</label>
                <input class="input" type="text" id="nameInput" placeholder="ephercy" value="ephercy">
            </div>
            <div class="field">
                <label class="label">身高 (cm) 100-250</label>
                <input class="input" type="number" id="heightInput" min="100" max="250" step="1" value="172">
            </div>
            <div class="field">
                <label class="label">当前体重 (kg) 30-200</label>
                <input class="input" type="number" id="weightInput" min="30" max="200" step="0.1" value="92.0">
            </div>
            <div class="field">
                <label class="label">目标BMI <span id="bmiValue">23.66</span></label>
                <input type="range" id="bmiSlider" min="18.5" max="28" step="0.01" value="23.66" style="width:100%">
                <div class="bmi-slider-labels">
                    <span>偏瘦 18.5</span> <span>正常</span> <span>偏胖</span> <span>肥胖 28</span>
                </div>
            </div>
            <!-- 预览卡片 -->
            <div class="target-preview" id="targetPreview">
                <div>您的目标体重</div>
                <div class="big" id="goalPreview">65.08</div>
                <div class="help">kg</div>
            </div>
            <!-- 底部按钮组 -->
            <div class="buttons is-flex is-justify-content-space-between mt-5">
                <button class="button is-light" id="importSetupBtn">📂 导入已有数据</button>
                <button class="button is-success" id="startBtn">▶ 开始记录</button>
            </div>
            <input type="file" id="importFileInput" accept=".json" style="display: none;">
        </div>
    </div>

    <!-- 主界面 (初始隐藏) -->
    <div id="mainPage" class="is-hidden">
        <!-- 动态渐变卡片 -->
        <div class="progress-card" id="progressCard">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-content" id="progressContent">
                <div class="top-row">
                    <div class="user-info">
                        <div class="avatar" id="avatar">E</div>
                        <div><span id="headerName">ephercy</span> · <span id="headerHeight">172</span>cm · 目标 <span id="headerGoal">65.1</span>kg</div>
                    </div>
                    <button class="menu-btn" id="menuButton">⋯</button>
                </div>
                <div class="weight-row">
                    <span class="big-weight" id="todayActual">87.6</span>
                    <span class="big-weight" id="todayGoal">92.0</span>
                </div>
                <div class="is-flex is-justify-content-space-between">
                    <span>今日实际</span>
                    <span>今日目标</span>
                </div>
                <div class="start-goal" id="startGoalText">92.0 kg → 65.1 kg</div>
            </div>
            <!-- 菜单下拉 -->
            <div class="menu-dropdown" id="menuDropdown">
                <div class="menu-item" id="exportData">📥 导出数据</div>
                <div class="menu-item" id="clearData">🗑️ 清除数据</div>
            </div>
        </div>

        <!-- 录入区域 -->
        <div class="card">
            <div class="card-content">
                <div class="entry-box">
                    <div class="control">
                        <input class="input" type="number" step="any" id="weightInputMain" placeholder="今日体重">
                    </div>
                    <button class="button is-success" id="saveWeightBtn">保存</button>
                </div>
                <div id="todayEntriesDisplay" class="today-entries mt-3"></div>
            </div>
        </div>

        <!-- 图表区域 7日柱状图 -->
        <div class="card">
            <div class="card-content" style="padding: 10px 10px 0 10px;">
                <canvas id="weightChart" height="260" style="width:100%; height:260px;"></canvas>
            </div>
        </div>
    </div>

    <!-- 清除确认模态框 -->
    <div class="modal" id="confirmModal">
        <div class="modal-background" style="backdrop-filter: blur(4px);"></div>
        <div class="modal-card" style="border-radius: 2rem;">
            <section class="modal-card-body">
                <h3 class="title is-5">确认清除？</h3>
                <p class="mb-5">所有本地数据将被永久删除</p>
                <div class="buttons">
                    <button class="button is-light" id="cancelClear">取消</button>
                    <button class="button is-danger" id="confirmClear">清除</button>
                </div>
            </section>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 核心存储 ----------
        let userData = {
            name: 'ephercy',
            height: '172',
            weight: '92.0',
            goal: '65.08',
            progress: {}      // 结构 {"2026-03": {"15": ["65.08","87.6","87.5"] ...} ...}
        };

        const STORAGE_KEY = 'weight_diary_app';
        let chartInstance = null;

        // ---------- 工具函数 ----------
        function saveToLocal() { 
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userData)); 
        }
        
        function loadFromLocal() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) { 
                try { 
                    userData = JSON.parse(saved); 
                } catch (e) { 
                    console.warn('解析失败'); 
                }
            }
        }

        // 目标体重递推公式: b = a - (a * 0.0008 + 0.14) / 2
        function nextGoal(prevGoal) {
            let a = parseFloat(prevGoal);
            if (isNaN(a)) return a;
            let b = a - (a * 0.0008 + 0.14) / 2;
            return Math.round(b * 100) / 100;
        }

        // 获取最近一次实际体重(平均值)和日期
        function getLastRecordedWeight() {
            let lastWeight = parseFloat(userData.weight); // 起始体重兜底
            let lastDate = null;
            const months = Object.keys(userData.progress);
            months.sort().reverse();
            for (let m of months) {
                const days = Object.keys(userData.progress[m]).map(Number).sort((a,b)=>b-a);
                for (let d of days) {
                    const arr = userData.progress[m][d];
                    if (arr.length >= 2) { // 有实际记录
                        const vals = arr.slice(1).map(v=>parseFloat(v)).filter(v=>!isNaN(v));
                        if (vals.length) {
                            return { 
                                weight: vals.reduce((a,b)=>a+b,0)/vals.length, 
                                date: `${m}-${d}` 
                            };
                        }
                    }
                }
            }
            return { weight: parseFloat(userData.weight), date: null };
        }

        // 计算进度百分比 (起始体重 - 当前体重)/(起始体重 - 目标体重) * 100%
        function computeProgress(currentWeight) {
            const start = parseFloat(userData.weight);
            const goal = parseFloat(userData.goal);
            if (start <= goal) return 100; // 已经达到或低于目标，取100%
            let raw = (start - currentWeight) / (start - goal) * 100;
            return Math.min(100, Math.max(0, raw));
        }

        // 检查自动清理（连续4天无任何数据）
        function checkAutoReset() {
            const today = new Date();
            // 向前推4天
            let continuousMiss = 0;
            for (let i = 0; i < 4; i++) {
                let d = new Date(today);
                d.setDate(today.getDate() - i);
                let m = (d.getMonth() + 1).toString().padStart(2, '0');
                let da = d.getDate().toString().padStart(2, '0');
                
                if (userData.progress[m] && userData.progress[m][da] && userData.progress[m][da].length > 0) {
                    continuousMiss = 0; // 有数据打断
                } else {
                    continuousMiss++;
                }
            }
            if (continuousMiss >= 4) {
                localStorage.removeItem(STORAGE_KEY);
                userData = { 
                    name: 'ephercy', 
                    height: '172', 
                    weight: '92.0', 
                    goal: '65.08', 
                    progress: {} 
                };
                alert('连续4天未记录，请重新开始');
                window.location.reload(); // 简单重置
            }
        }

        // 生成某天目标 (基于之前最近目标递推)
        function generateTargetForDate(date) {
            // 简单实现: 从起始体重开始逐日递推到date
            const start = parseFloat(userData.weight);
            
            // 寻找最早记录日
            let daysMap = [];
            for (let month in userData.progress) {
                for (let day in userData.progress[month]) {
                    daysMap.push({ 
                        month, 
                        day, 
                        target: parseFloat(userData.progress[month][day][0]) 
                    });
                }
            }
            
            daysMap.sort((a, b) => {
                let da = new Date(2026, parseInt(a.month) - 1, parseInt(a.day));
                let db = new Date(2026, parseInt(b.month) - 1, parseInt(b.day));
                return da - db;
            });
            
            let lastTarget = daysMap.length ? daysMap[daysMap.length - 1].target : start;
            let lastDate = daysMap.length ? 
                new Date(2026, parseInt(daysMap[daysMap.length - 1].month) - 1, parseInt(daysMap[daysMap.length - 1].day)) : 
                new Date(2026, 0, 1);
            
            let targetDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            let cur = new Date(lastDate);
            let curTarget = lastTarget;
            
            while (cur < targetDate) {
                cur.setDate(cur.getDate() + 1);
                curTarget = nextGoal(curTarget);
            }
            return curTarget;
        }

        // ---------- 渲染主界面 ----------
        function renderMain() {
            if (!userData) return;
            checkAutoReset(); // 每次渲染检查

            // 基本信息
            document.getElementById('avatar').innerText = (userData.name.charAt(0) || 'U').toUpperCase();
            document.getElementById('headerName').innerText = userData.name;
            document.getElementById('headerHeight').innerText = userData.height;
            document.getElementById('headerGoal').innerText = parseFloat(userData.goal).toFixed(1);
            document.getElementById('startGoalText').innerHTML = `${parseFloat(userData.weight).toFixed(1)} kg → ${parseFloat(userData.goal).toFixed(1)} kg`;

            // 今日实际平均值
            const today = new Date();
            const m = (today.getMonth() + 1).toString().padStart(2, '0');
            const d = today.getDate().toString().padStart(2, '0');
            let todayActual = parseFloat(userData.weight); // 默认起始
            let todayGoal = parseFloat(userData.weight); // 默认起始
            let entriesList = [];

            if (userData.progress[m] && userData.progress[m][d]) {
                const arr = userData.progress[m][d];
                if (arr.length >= 1) todayGoal = parseFloat(arr[0]); // 第一个是目标
                if (arr.length > 1) {
                    const actuals = arr.slice(1).map(v => parseFloat(v));
                    todayActual = actuals.reduce((a, b) => a + b, 0) / actuals.length;
                    entriesList = arr.slice(1);
                } else {
                    // 只有目标没有实际，则实际取最近
                    const last = getLastRecordedWeight();
                    todayActual = last.weight;
                }
            } else {
                // 无今日记录，取最近实际体重
                const last = getLastRecordedWeight();
                todayActual = last.weight;
                // 目标体重：基于最后一天的目标递推得到今天
                todayGoal = generateTargetForDate(today);
            }

            document.getElementById('todayActual').innerText = todayActual.toFixed(2);
            document.getElementById('todayGoal').innerText = todayGoal.toFixed(2);

            // 进度条宽度/颜色
            const progress = computeProgress(todayActual);
            const fillDiv = document.getElementById('progressFill');
            fillDiv.style.width = progress + '%';
            if (todayActual > todayGoal) {
                fillDiv.classList.add('red-fill');
            } else {
                fillDiv.classList.remove('red-fill');
            }

            // 显示今日已有录入
            let displayStr = '';
            if (entriesList.length) {
                displayStr = entriesList.map(v => parseFloat(v).toFixed(2)).join(' kg, ') + ' kg';
            }
            document.getElementById('todayEntriesDisplay').innerText = displayStr ? `今日记录: ${displayStr}` : '今日暂无记录';

            // 更新图表
            updateChart();

            // 菜单隐藏
            document.getElementById('menuDropdown').classList.remove('show');
        }

        // 更新柱状图
        function updateChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            // 最近7天
            const labels = [];
            const actualData = [];
            const goalData = [];
            const today = new Date();
            
            for (let i = 6; i >= 0; i--) {
                let d = new Date(today);
                d.setDate(today.getDate() - i);
                let month = (d.getMonth() + 1).toString().padStart(2, '0');
                let day = d.getDate().toString().padStart(2, '0');
                labels.push(`${month}/${day}`);
                
                let goal = null, actual = null;
                if (userData.progress[month] && userData.progress[month][day]) {
                    let arr = userData.progress[month][day];
                    if (arr.length >= 1) goal = parseFloat(arr[0]);
                    if (arr.length > 1) {
                        let acts = arr.slice(1).map(v => parseFloat(v));
                        actual = acts.reduce((a, b) => a + b, 0) / acts.length;
                    }
                }
                
                // 若没有，尝试生成目标（递推）
                if (goal === null) {
                    goal = generateTargetForDate(d);
                }
                if (actual === null) {
                    // 最近一次实际
                    let last = getLastRecordedWeight().weight;
                    actual = last;
                }
                goalData.push(goal);
                actualData.push(actual);
            }

            // Y轴范围
            let base = Math.floor(Math.min(...actualData));
            if (!isFinite(base)) base = 70;
            const minY = base - 2;
            const maxY = base + 1;

            // 生成柱状图颜色（实际体重 <= 目标为全绿，否则部分红——简化处理，用绿色并添加说明）
            const backgroundColors = actualData.map((act, idx) => {
                if (act === null) return '#cccccc';
                if (act <= goalData[idx]) return '#2cbe6c';
                return '#2cbe6c'; // 简化：全部用绿色，但在tooltip中显示差异
            });

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '体重 (kg)',
                        data: actualData,
                        backgroundColor: backgroundColors,
                        borderColor: '#2cbe6c',
                        borderRadius: 8,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: (ctx) => {
                                    let idx = ctx.dataIndex;
                                    let act = actualData[idx];
                                    let goal = goalData[idx];
                                    return `${act.toFixed(2)} kg (目标: ${goal.toFixed(2)} kg)`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            min: minY,
                            max: maxY,
                            grid: { color: '#ddd', lineWidth: 0.5 }
                        }
                    }
                }
            });
        }

        // 保存体重
        function saveWeight() {
            const input = document.getElementById('weightInputMain');
            let val = parseFloat(input.value);
            if (isNaN(val) || val < 30 || val > 200) { 
                alert('体重须在30-200kg之间'); 
                return; 
            }
            val = Math.round(val * 100) / 100;
            
            const today = new Date();
            const m = (today.getMonth() + 1).toString().padStart(2, '0');
            const d = today.getDate().toString().padStart(2, '0');
            
            if (!userData.progress[m]) userData.progress[m] = {};
            if (!userData.progress[m][d]) {
                // 新建今日记录，第一个元素为目标体重
                let goalToday = generateTargetForDate(today);
                userData.progress[m][d] = [goalToday.toFixed(2)];
            }
            userData.progress[m][d].push(val.toFixed(2));
            input.value = '';
            saveToLocal();
            renderMain();
        }

        // 导入数据
        function importData(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const json = JSON.parse(e.target.result);
                    if (!json.name || !json.height || !json.weight || !json.goal || typeof json.progress !== 'object') {
                        throw new Error('缺少必须字段');
                    }
                    userData = json;
                    saveToLocal();
                    window.location.reload(); // 刷新
                } catch (err) { 
                    alert('导入失败: ' + err.message); 
                }
            };
            reader.readAsText(file);
        }

        // ---------- 初始化UI及事件 ----------
        window.addEventListener('load', function() {
            loadFromLocal();
            
            // 检查是否有数据决定显示哪个页面
            const hasData = Object.keys(userData.progress || {}).length > 0;
            const setupPage = document.getElementById('setupPage');
            const mainPage = document.getElementById('mainPage');
            
            if (hasData) {
                setupPage.classList.add('is-hidden');
                mainPage.classList.remove('is-hidden');
                renderMain();
            } else {
                setupPage.classList.remove('is-hidden');
                mainPage.classList.add('is-hidden');
            }

            // ---------- 设置页逻辑 ----------
            const heightInp = document.getElementById('heightInput');
            const weightInp = document.getElementById('weightInput');
            const bmiSlider = document.getElementById('bmiSlider');
            const bmiSpan = document.getElementById('bmiValue');
            const goalSpan = document.getElementById('goalPreview');

            function updateGoalFromBMI() {
                let h = parseFloat(heightInp.value) / 100;
                let bmi = parseFloat(bmiSlider.value);
                let goal = bmi * h * h;
                goalSpan.innerText = goal.toFixed(2);
                bmiSpan.innerText = bmi.toFixed(2);
            }
            
            heightInp.addEventListener('input', updateGoalFromBMI);
            bmiSlider.addEventListener('input', updateGoalFromBMI);
            updateGoalFromBMI(); // 初始化

            // 开始记录按钮
            document.getElementById('startBtn').addEventListener('click', function() {
                let name = document.getElementById('nameInput').value.trim();
                let height = parseFloat(document.getElementById('heightInput').value);
                let weight = parseFloat(document.getElementById('weightInput').value);
                let goalVal = parseFloat(document.getElementById('goalPreview').innerText);
                
                if (!name) { 
                    alert('姓名不能为空'); 
                    return; 
                }
                if (height < 100 || height > 250) { 
                    alert('身高必须在100-250cm之间'); 
                    return; 
                }
                if (weight < 30 || weight > 200) { 
                    alert('体重必须在30-200kg之间'); 
                    return; 
                }
                
                userData = {
                    name: name,
                    height: height.toString(),
                    weight: weight.toFixed(2),
                    goal: goalVal.toFixed(2),
                    progress: {}
                };
                
                saveToLocal();
                
                // 切换到主界面
                document.getElementById('setupPage').classList.add('is-hidden');
                document.getElementById('mainPage').classList.remove('is-hidden');
                renderMain();
            });

            // 导入相关
            document.getElementById('importSetupBtn').addEventListener('click', function() {
                document.getElementById('importFileInput').click();
            });
            
            document.getElementById('importFileInput').addEventListener('change', function(e) {
                if (e.target.files[0]) importData(e.target.files[0]);
            });

            // ---------- 主界面事件 ----------
            document.getElementById('saveWeightBtn').addEventListener('click', saveWeight);
            
            document.getElementById('weightInputMain').addEventListener('keypress', function(e) { 
                if(e.key === 'Enter') saveWeight(); 
            });

            // 菜单
            const menuBtn = document.getElementById('menuButton');
            const menuDrop = document.getElementById('menuDropdown');
            
            menuBtn.addEventListener('click', function(e) { 
                e.stopPropagation(); 
                menuDrop.classList.toggle('show'); 
            });
            
            document.addEventListener('click', function() {
                menuDrop.classList.remove('show');
            });

            // 导出数据
            document.getElementById('exportData').addEventListener('click', function() {
                const dataStr = JSON.stringify(userData, null, 2);
                const blob = new Blob([dataStr], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${userData.name}_data.json`;
                a.click();
                URL.revokeObjectURL(url);
            });

            // 清除确认模态框
            const modal = document.getElementById('confirmModal');
            
            document.getElementById('clearData').addEventListener('click', function() {
                modal.classList.add('is-active');
            });
            
            document.getElementById('cancelClear').addEventListener('click', function() {
                modal.classList.remove('is-active');
            });
            
            document.getElementById('confirmClear').addEventListener('click', function() {
                localStorage.removeItem(STORAGE_KEY);
                userData = { 
                    name: 'ephercy', 
                    height: '172', 
                    weight: '92.0', 
                    goal: '65.08', 
                    progress: {} 
                };
                modal.classList.remove('is-active');
                
                // 返回设置页
                document.getElementById('setupPage').classList.remove('is-hidden');
                document.getElementById('mainPage').classList.add('is-hidden');
            });
            
            window.addEventListener('click', function(e) { 
                if(e.target.classList.contains('modal-background')) {
                    modal.classList.remove('is-active');
                }
            });
        });
    })();
</script>
</body>
</html>
