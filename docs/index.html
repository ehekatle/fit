<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>体重日记 · 本地存储</title>
    <!-- Bulma CSS (轻量 modern 框架) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
    <!-- Chart.js 轻量图表 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f5f8fa;
            min-height: 100vh;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }
        /* 卡片样式 */
        .card-glass {
            border-radius: 32px;
            background: white;
            box-shadow: 0 12px 30px rgba(0,0,0,0.05);
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.2s;
        }
        /* 动态双色卡片 (进度卡片) */
        .progress-card {
            position: relative;
            border-radius: 28px;
            overflow: hidden;
            background-color: #f0f0f0;  /* 右侧灰色基色 */
            background-image: linear-gradient(120deg, #eaeef2 0%, #f8fafc 100%);
            isolation: isolate;
            margin-bottom: 20px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
        }
        /* 绿色/红色动态层 (宽度由JS控制) */
        .dynamic-overlay {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;  /* JS实时修改 */
            background: linear-gradient(145deg, #48d1a0, #2b8c6b); /* 翠绿渐变 */
            transition: width 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
            border-radius: 28px 0 0 28px;
            z-index: 1;
        }
        /* 当进度为负或者红色态 (实际体重 > 目标) 可切换红色渐变——但注意逻辑：左侧层宽度不变，但颜色可变成红色 */
        .dynamic-overlay.red-overlay {
            background: linear-gradient(145deg, #f57c7c, #c23b3b); /* 红色渐变 */
        }
        /* 卡片内容（始终在上层，利用混合模式保证可读） */
        .progress-card-content {
            position: relative;
            z-index: 10;
            padding: 20px;
            color: #1e2b2f;
            mix-blend-mode: difference;  /* 使文字在深色/浅色背景下都清晰 (反色效果) */
            caret-color: auto;
            background: transparent;
            pointer-events: auto; /* 按钮可点 */
        }
        /* 顶部用户行 */
        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        .user-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar-circle {
            width: 44px;
            height: 44px;
            border-radius: 100px;
            background: linear-gradient(145deg, #f9c58b, #f492b0, #b69bf2);
            color: white;
            font-weight: 600;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            mix-blend-mode: normal; /* 头像保留原色 */
        }
        .user-stats {
            font-size: 1rem;
            font-weight: 500;
            mix-blend-mode: normal;  /* 强制保留深色 (因为父级difference会使浅色变深) 但背景为白色/深色时会反转 */
            color: #0b1c22; 
        }
        .user-stats span {
            font-weight: 300;
            margin: 0 2px;
        }
        .menu-btn {
            background: transparent;
            border: none;
            font-size: 2rem;
            line-height: 1;
            cursor: pointer;
            color: currentColor;
            padding: 0 8px;
            mix-blend-mode: difference;
        }
        /* 重量大数字行 */
        .weight-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 5px 0 5px;
        }
        .weight-today {
            font-size: 2.2rem;
            font-weight: 700;
        }
        .weight-goal {
            font-size: 2.2rem;
            font-weight: 600;
            opacity: 0.8;
        }
        .unit-sm {
            font-size: 1.1rem;
            font-weight: 400;
            margin-left: 2px;
        }
        .bottom-start-end {
            display: flex;
            gap: 8px;
            font-size: 1.1rem;
            font-weight: 450;
            margin-top: 12px;
        }
        /* 体重录入区域 */
        .entry-box {
            background: white;
            border-radius: 40px;
            padding: 6px 6px 6px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.02);
            border: 1px solid #e6edf0;
        }
        .entry-box input {
            border: none;
            font-size: 1.4rem;
            width: 130px;
            outline: none;
            background: transparent;
            text-align: center;
            font-weight: 500;
        }
        .entry-box input::placeholder {
            color: #bbb;
            font-size: 1.2rem;
        }
        .save-hint {
            background: #00b894;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: default;
        }
        .today-log {
            text-align: center;
            margin-top: 8px;
            font-size: 0.95rem;
            color: #3a4f59;
            background: #f0f6fa;
            padding: 6px 16px;
            border-radius: 50px;
            display: inline-block;
        }
        /* 滑块与区间 */
        .bmi-slider-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .slider-value {
            min-width: 55px;
            font-weight: 600;
        }
        .bmi-tags {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #4a5f69;
            margin-top: 6px;
        }
        .goal-preview-card {
            background: #e3f4ed;
            border-radius: 28px;
            padding: 16px 22px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .goal-preview-label {
            font-weight: 500;
        }
        .goal-preview-number {
            font-size: 2rem;
            font-weight: 700;
            color: #00b894;
        }
        .bottom-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        button.is-light {
            background: #eef3f7;
        }
        /* 清除模态框 (隐藏默认) */
        .modal-custom {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-card {
            background: white;
            border-radius: 2rem;
            padding: 28px 32px;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0,0,0,0.2);
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }
        .button-cancel {
            background: #eef3f7;
            border: none;
            flex:1;
            padding: 14px;
            border-radius: 60px;
            font-weight: 600;
        }
        .button-clear {
            background: #d44c4c;
            color: white;
            border: none;
            flex:1;
            padding: 14px;
            border-radius: 60px;
            font-weight: 600;
        }
        .hidden {
            display: none;
        }
        .file-input-label {
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- 首次设置面板 (默认显示) -->
    <div id="setupPanel" class="card-glass">
        <h2 class="is-size-4 mb-4 fw-semibold">⚡ 首次设置</h2>
        <div class="field">
            <label class="label">姓名</label>
            <input class="input" type="text" id="setupName" value="ephercy" placeholder="ephercy">
        </div>
        <div class="field">
            <label class="label">身高 (cm) 100-250</label>
            <input class="input" type="number" id="setupHeight" value="172" step="1" min="100" max="250">
        </div>
        <div class="field">
            <label class="label">当前体重 (kg) 30-200</label>
            <input class="input" type="number" id="setupWeight" value="92" step="any" min="30" max="200">
        </div>
        <div class="field">
            <label class="label">目标BMI (18.5-28.0)</label>
            <div class="bmi-slider-row">
                <input type="range" id="bmiSlider" min="18.5" max="28" value="23.66" step="0.01" style="flex:3">
                <span class="slider-value" id="bmiValue">23.66</span>
            </div>
            <div class="bmi-tags">
                <span>偏瘦</span><span>正常</span><span>偏胖</span><span>肥胖</span>
            </div>
        </div>
        <!-- 目标预览卡片 -->
        <div class="goal-preview-card" id="goalPreviewCard">
            <span class="goal-preview-label">您的目标体重</span>
            <span class="goal-preview-number" id="goalPreviewNumber">65.08</span>
        </div>
        <!-- 导入/开始按钮 -->
        <div class="bottom-buttons">
            <button class="button is-light is-half" id="importBtn">📂 导入已有数据</button>
            <button class="button is-success is-half" id="startBtn">✅ 开始记录</button>
        </div>
        <input type="file" id="fileImport" accept=".json" style="display: none;">
    </div>

    <!-- 主界面 (默认隐藏) -->
    <div id="mainPanel" class="hidden">
        <!-- 动态进度卡片 -->
        <div class="progress-card" id="progressCard">
            <div class="dynamic-overlay" id="progressOverlay"></div>
            <div class="progress-card-content">
                <!-- 顶部用户 -->
                <div class="user-row">
                    <div class="user-left">
                        <div class="avatar-circle" id="avatar">E</div>
                        <div class="user-stats" id="userStats">ephercy 172cm 65.1kg</div>
                    </div>
                    <button class="menu-btn" id="menuBtn">⋯</button>
                </div>
                <!-- 今日实际 vs 目标 -->
                <div class="weight-row">
                    <span class="weight-today" id="todayActual">87.6 <span class="unit-sm">kg</span></span>
                    <span class="weight-goal" id="todayGoal">87.5 <span class="unit-sm">kg</span></span>
                </div>
                <!-- 起始→目标 -->
                <div class="bottom-start-end" id="startToGoal">87.6 kg → 65.1 kg</div>
            </div>
        </div>

        <!-- 体重录入卡片 -->
        <div class="card-glass" style="padding: 24px 20px;">
            <div class="entry-box">
                <input type="number" id="weightInput" placeholder="今日体重" step="any" value="">
                <span class="save-hint">↵ 回车</span>
            </div>
            <div id="todayEntries" class="today-log">暂无记录</div>
        </div>

        <!-- 柱状图卡片 -->
        <div class="card-glass" style="padding: 8px 4px;">
            <canvas id="weightChart" height="260" style="width:100%; height:260px;"></canvas>
        </div>
    </div>
</div>

<!-- 清除确认模态框 -->
<div class="modal-custom" id="clearModal">
    <div class="modal-card">
        <h3 class="is-size-4 mb-2">确认清除？</h3>
        <p class="has-text-grey">所有本地数据将被永久删除</p>
        <div class="modal-actions">
            <button class="button-cancel" id="cancelClear">取消</button>
            <button class="button-clear" id="confirmClear">清除</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 存储KEY ----------
        const STORAGE_KEY = 'weight_diary_app';
        
        // ---------- 全局状态 ----------
        let appData = null;               // 完整数据结构
        let chartInstance = null;         // Chart.js 实例

        // DOM 元素
        const setupPanel = document.getElementById('setupPanel');
        const mainPanel = document.getElementById('mainPanel');
        const setupName = document.getElementById('setupName');
        const setupHeight = document.getElementById('setupHeight');
        const setupWeight = document.getElementById('setupWeight');
        const bmiSlider = document.getElementById('bmiSlider');
        const bmiValue = document.getElementById('bmiValue');
        const goalPreviewNumber = document.getElementById('goalPreviewNumber');
        const startBtn = document.getElementById('startBtn');
        const importBtn = document.getElementById('importBtn');
        const fileImport = document.getElementById('fileImport');

        // 主界面元素
        const avatar = document.getElementById('avatar');
        const userStats = document.getElementById('userStats');
        const todayActual = document.getElementById('todayActual');
        const todayGoal = document.getElementById('todayGoal');
        const startToGoal = document.getElementById('startToGoal');
        const progressOverlay = document.getElementById('progressOverlay');
        const weightInput = document.getElementById('weightInput');
        const todayEntries = document.getElementById('todayEntries');
        const menuBtn = document.getElementById('menuBtn');
        const clearModal = document.getElementById('clearModal');
        const cancelClear = document.getElementById('cancelClear');
        const confirmClear = document.getElementById('confirmClear');

        // ---------- 辅助函数 ----------
        function calculateGoalWeightFromBMI(bmi, heightCm) {
            const heightM = heightCm / 100;
            return (bmi * heightM * heightM).toFixed(2);
        }

        // 更新预览卡片目标体重 (设置页)
        function updateGoalPreview() {
            const height = parseFloat(setupHeight.value) || 172;
            const bmi = parseFloat(bmiSlider.value) || 23.66;
            const goal = calculateGoalWeightFromBMI(bmi, height);
            goalPreviewNumber.innerText = goal;
            bmiValue.innerText = bmi.toFixed(2);
        }

        // 根据姓名更新头像
        function updateAvatar(name) {
            if (avatar) avatar.innerText = (name || 'E').charAt(0).toUpperCase();
        }

        // 从localStorage加载
        function loadFromStorage() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (parsed && parsed.name && parsed.height && parsed.weight && parsed.goal && parsed.progress) {
                        appData = parsed;
                        return true;
                    }
                } catch (e) {}
            }
            return false;
        }

        // 保存至localStorage
        function saveToStorage() {
            if (appData) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
            }
        }

        // 计算每日目标体重 (递推公式)
        function getTargetForDate(baseDate, startWeight, goalWeight) {
            // 目标递推: b = a - (a * 0.0008 + 0.14) / 2
            // 我们只需要基于开始日期算起, 第一天目标 = startWeight
            if (!appData) return startWeight;
            const start = new Date('2026-03-01'); // 固定一个起点便于展示, 实际可使用首次记录日期, 但为简化用起始体重
            // 但根据要求: 第一天目标体重 = 起始体重。后续基于前一天目标计算。因为未指定起始日期, 我们动态基于progress计算。
            // 实现简便: 排序所有日期, 找到当天之前最近的一天目标体重递推。
            // 若今天还没有目标, 需要计算; 已有目标则直接取。
            // 这里实现目标存储：每日目标已作为progress[月份][day]数组第一个元素
            const yearMonth = baseDate.toISOString().slice(0,7); // "2026-03"
            const day = baseDate.getDate().toString();
            if (appData.progress[yearMonth] && appData.progress[yearMonth][day] && appData.progress[yearMonth][day].length>0) {
                return parseFloat(appData.progress[yearMonth][day][0]);
            }
            // 否则找最近一天目标推算
            let latestTarget = parseFloat(appData.weight); // 起始
            // 将所有记录拍平排序
            const allEntries = [];
            for (const ym in appData.progress) {
                for (const d in appData.progress[ym]) {
                    const timestamp = new Date(ym + '-' + d).getTime();
                    if (!isNaN(timestamp)) {
                        allEntries.push({ date: new Date(ym + '-' + d), dayData: appData.progress[ym][d] });
                    }
                }
            }
            allEntries.sort((a,b) => a.date - b.date);
            for (let entry of allEntries) {
                if (entry.date >= baseDate) break;
                if (entry.dayData && entry.dayData.length > 0) {
                    latestTarget = parseFloat(entry.dayData[0]); // 当天目标
                }
            }
            // 如果当天没有目标，基于latestTarget递推至当天
            if (latestTarget) {
                let cur = latestTarget;
                const oneDay = 24*60*60*1000;
                let lastDate = allEntries.length ? allEntries[allEntries.length-1].date : new Date(); 
                // 简单只递推一次? 准确做法: 如果当天没有目标，应该基于前一天目标计算并存储。但在显示时我们计算并返回新目标但不保存。
                // 这里简化: 直接返回最近的目标。项目要求“目标体重仅基于前一天目标体重计算，与实际体重无关”, 为了UI不自动保存, 计算但不存储。
                // 实现: 如果当天没有目标，我们用前一天目标计算一次（若前一天也存在）
                // 寻找最近的前一天日期
                let prevDate = new Date(baseDate);
                prevDate.setDate(prevDate.getDate() - 1);
                const prevYM = prevDate.toISOString().slice(0,7);
                const prevD = prevDate.getDate().toString();
                let prevTarget = null;
                if (appData.progress[prevYM] && appData.progress[prevYM][prevD]) {
                    prevTarget = parseFloat(appData.progress[prevYM][prevD][0]);
                } else {
                    // 否则递归获取 prevDate 的目标
                    prevTarget = getTargetForDate(prevDate, startWeight, goalWeight);
                }
                if (prevTarget) {
                    return prevTarget - (prevTarget * 0.0008 + 0.14) / 2;
                }
            }
            return parseFloat(appData.weight); // fallback
        }

        // 刷新主界面UI + 图表
        function refreshMainUI() {
            if (!appData) return;
            const name = appData.name;
            const height = appData.height;
            const startW = parseFloat(appData.weight);
            const goalW = parseFloat(appData.goal);
            updateAvatar(name);
            userStats.innerText = `${name} ${height}cm ${goalW.toFixed(1)}kg`;

            // 今日日期
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const monthKey = `${yyyy}-${mm}`;
            const dayKey = String(today.getDate());

            // 获取今日实际平均值
            let todayAvg = null;
            let todayEntriesArr = [];
            if (appData.progress[monthKey] && appData.progress[monthKey][dayKey] && appData.progress[monthKey][dayKey].length > 1) {
                todayEntriesArr = appData.progress[monthKey][dayKey].slice(1); // 除去目标
                if (todayEntriesArr.length) {
                    const sum = todayEntriesArr.reduce((a, b) => a + parseFloat(b), 0);
                    todayAvg = sum / todayEntriesArr.length;
                }
            }
            // 今日目标 (取出或计算)
            let todayTarget = goalW;
            if (appData.progress[monthKey] && appData.progress[monthKey][dayKey] && appData.progress[monthKey][dayKey].length > 0) {
                todayTarget = parseFloat(appData.progress[monthKey][dayKey][0]);
            } else {
                // 计算今日目标但暂不存储 (避免污染)
                todayTarget = getTargetForDate(today, startW, goalW);
            }

            // 当前体重用于进度: 若有今日平均用今日平均, 否则取最近一次有效
            let currentWeight = todayAvg !== null ? todayAvg : startW;
            if (currentWeight === null) {
                // 找最近一次
                for (const ym in appData.progress) {
                    for (const d in appData.progress[ym]) {
                        const arr = appData.progress[ym][d];
                        if (arr.length > 1) {
                            const vals = arr.slice(1).map(v=>parseFloat(v));
                            if (vals.length) currentWeight = vals[vals.length-1];
                        }
                    }
                }
            }
            if (currentWeight === null) currentWeight = startW;

            // 今日实际显示
            todayActual.innerHTML = `${(todayAvg !== null ? todayAvg.toFixed(2) : '--')} <span class="unit-sm">kg</span>`;
            todayGoal.innerHTML = `${todayTarget.toFixed(2)} <span class="unit-sm">kg</span>`;
            startToGoal.innerText = `${startW.toFixed(1)} kg → ${goalW.toFixed(1)} kg`;

            // 进度百分比 (起始-当前)/(起始-目标)
            let progressPercent = 0;
            if (startW - goalW !== 0) {
                progressPercent = ((startW - currentWeight) / (startW - goalW)) * 100;
                if (progressPercent > 100) progressPercent = 100;
                if (progressPercent < 0) progressPercent = 0;
            }
            progressOverlay.style.width = progressPercent + '%';

            // 如果今日实际 > 今日目标，进度层变红色 (否则绿色)
            if (todayAvg !== null && todayAvg > todayTarget) {
                progressOverlay.classList.add('red-overlay');
            } else {
                progressOverlay.classList.remove('red-overlay');
            }

            // 今日录入显示
            if (todayEntriesArr.length) {
                todayEntries.innerText = todayEntriesArr.map(v => parseFloat(v).toFixed(2) + ' kg').join(' / ');
            } else {
                todayEntries.innerText = '暂无记录';
            }

            // 刷新图表
            updateChart();
        }

        // 更新柱状图 (最近7天)
        function updateChart() {
            if (!appData) return;
            const today = new Date();
            const labels = [];
            const actualData = [];
            const targetData = [];
            const grayData = []; // 无数据标记用null
            for (let i = 6; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const monthKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                const dayKey = String(d.getDate());
                const label = `${d.getMonth()+1}/${d.getDate()}`;
                labels.push(label);

                let actual = null;
                let target = null;
                if (appData.progress[monthKey] && appData.progress[monthKey][dayKey]) {
                    const arr = appData.progress[monthKey][dayKey];
                    if (arr.length > 0) target = parseFloat(arr[0]);
                    if (arr.length > 1) {
                        const vals = arr.slice(1).map(v=>parseFloat(v));
                        actual = vals.reduce((a,b)=>a+b,0)/vals.length;
                    }
                }
                targetData.push(target);
                if (actual !== null) {
                    actualData.push(actual);
                    grayData.push(null);
                } else {
                    actualData.push(null);
                    grayData.push(0.1); // 占位灰色
                }
            }

            if (chartInstance) chartInstance.destroy();

            const ctx = document.getElementById('weightChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '实际体重',
                            data: actualData,
                            backgroundColor: (ctx) => {
                                const idx = ctx.dataIndex;
                                if (actualData[idx] === null) return '#cccccc'; // 灰色
                                const act = actualData[idx];
                                const tgt = targetData[idx];
                                if (act <= tgt) return '#00b894';
                                // 分段着色简单处理: 全柱绿色但额外红色层？简化：全部绿色 + 红色覆盖层不好，这里根据要求柱子颜色：低于目标绿，高于目标则红色显示多出部分。为实现简单且满足视觉效果，如果act>tgt，柱子用红色渐变代表超了
                                return '#f57c7c'; // 简化，显示红色代表超目标
                            },
                            borderRadius: 8,
                        },
                        {
                            label: '目标体重',
                            data: targetData,
                            type: 'line',
                            borderColor: '#2d3e50',
                            borderWidth: 2,
                            pointRadius: 3,
                            fill: false,
                            tension: 0.1,
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: (context) => {
                                    if (context.dataset.label === '实际体重') {
                                        const val = context.raw;
                                        if (val === null) return '暂无记录';
                                        const tgt = targetData[context.dataIndex];
                                        return `${val.toFixed(2)}kg (目标: ${tgt ? tgt.toFixed(2) : '--'}kg)`;
                                    }
                                    return context.dataset.label + ': ' + context.raw?.toFixed(2);
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            min: 70, max: 73, // 默认, 可根据数据调整，但简化
                            grid: { color: '#e0e0e0', lineWidth: 1 }
                        }
                    }
                }
            });
        }

        // ---------- 事件绑定 ----------
        bmiSlider.addEventListener('input', updateGoalPreview);
        setupHeight.addEventListener('input', updateGoalPreview);
        updateGoalPreview(); // 初始

        // 开始记录按钮
        startBtn.addEventListener('click', () => {
            const name = setupName.value.trim();
            const height = parseFloat(setupHeight.value);
            const weight = parseFloat(setupWeight.value);
            const bmi = parseFloat(bmiSlider.value);
            if (!name) return alert('姓名不能为空');
            if (isNaN(height) || height<100 || height>250) return alert('身高需100-250cm');
            if (isNaN(weight) || weight<30 || weight>200) return alert('体重需30-200kg');
            const goalWeight = parseFloat(goalPreviewNumber.innerText);
            appData = {
                name: name,
                height: height.toString(),
                weight: weight.toFixed(2),
                goal: goalWeight.toFixed(2),
                progress: {}
            };
            saveToStorage();
            setupPanel.classList.add('hidden');
            mainPanel.classList.remove('hidden');
            refreshMainUI();
        });

        // 导入数据
        importBtn.addEventListener('click', () => fileImport.click());
        fileImport.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const json = JSON.parse(ev.target.result);
                    if (!json.name || !json.height || !json.weight || !json.goal || typeof json.progress !== 'object') {
                        throw new Error('缺少必需字段');
                    }
                    appData = json;
                    saveToStorage();
                    setupPanel.classList.add('hidden');
                    mainPanel.classList.remove('hidden');
                    refreshMainUI();
                } catch (err) {
                    alert('导入失败: 格式错误或缺少字段');
                } finally {
                    fileImport.value = '';
                }
            };
            reader.readAsText(file);
        });

        // 体重录入回车
        weightInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                let val = parseFloat(weightInput.value);
                if (isNaN(val) || val < 30 || val > 200) {
                    alert('体重须30-200kg');
                    weightInput.value = '';
                    return;
                }
                val = Math.round(val * 100) / 100; // 两位小数
                const today = new Date();
                const monthKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
                const dayKey = String(today.getDate());
                if (!appData.progress[monthKey]) appData.progress[monthKey] = {};
                if (!appData.progress[monthKey][dayKey]) {
                    // 先放入当日目标 (从起始递推或已有)
                    const target = getTargetForDate(today, parseFloat(appData.weight), parseFloat(appData.goal));
                    appData.progress[monthKey][dayKey] = [target.toFixed(2)];
                }
                appData.progress[monthKey][dayKey].push(val.toFixed(2));
                saveToStorage();
                weightInput.value = '';
                refreshMainUI();
            }
        });

        // 菜单: 导出/清除
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const dropdown = document.createElement('div');
            // 简易菜单：实际项目需要优雅dropdown，此处简化，直接用confirm风格
            if (confirm('操作: 确定导出数据？点取消打开清除确认')) {
                // 导出
                const dataStr = JSON.stringify(appData, null, 2);
                const blob = new Blob([dataStr], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${appData.name}_data.json`;
                a.click();
                URL.revokeObjectURL(url);
            } else {
                // 显示清除模态框
                clearModal.style.display = 'flex';
            }
        });

        cancelClear.addEventListener('click', () => clearModal.style.display = 'none');
        confirmClear.addEventListener('click', () => {
            localStorage.removeItem(STORAGE_KEY);
            appData = null;
            clearModal.style.display = 'none';
            mainPanel.classList.add('hidden');
            setupPanel.classList.remove('hidden');
            // 重置设置默认
            setupName.value = 'ephercy';
            setupHeight.value = '172';
            setupWeight.value = '92';
            bmiSlider.value = '23.66';
            updateGoalPreview();
        });

        // 启动检查localStorage
        if (loadFromStorage()) {
            setupPanel.classList.add('hidden');
            mainPanel.classList.remove('hidden');
            refreshMainUI();
        }
    })();
</script>
</body>
</html>
