<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>体重日记 · 科幻版</title>
    
    <!-- Bulma CSS 核心框架 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    
    <!-- 自定义科幻主题 -->
    <style>
        /* ===== 科幻主题变量 ===== */
        :root {
            --neon-cyan: #00ffff;
            --neon-blue: #0066ff;
            --neon-purple: #9900ff;
            --neon-pink: #ff00aa;
            --neon-green: #00ffaa;
            --dark-bg: #0a0f1e;
            --glass-bg: rgba(10, 20, 40, 0.7);
            --glass-border: rgba(0, 255, 255, 0.2);
            --glow-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        
        /* 全局科幻背景 */
        body {
            background: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 255, 255, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 90% 50%, rgba(255, 0, 170, 0.05) 0%, transparent 40%),
                linear-gradient(135deg, #0a0f1e 0%, #1a1f2e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        
        /* 移动端容器 - 带发光边框 */
        .cyber-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 1rem;
            position: relative;
        }
        
        /* 玻璃态卡片 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            box-shadow: 0 8px 32px rgba(0, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        /* 卡片发光边框动画 */
        .glass-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, 
                var(--neon-cyan), 
                var(--neon-blue), 
                var(--neon-purple), 
                var(--neon-pink));
            border-radius: 2rem;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .glass-card:hover::before {
            opacity: 0.5;
        }
        
        /* 霓虹文字 */
        .neon-text {
            color: white;
            text-shadow: 
                0 0 5px var(--neon-cyan),
                0 0 10px var(--neon-cyan),
                0 0 20px var(--neon-blue);
        }
        
        .neon-cyan {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        
        .neon-pink {
            color: var(--neon-pink);
            text-shadow: 0 0 10px rgba(255, 0, 170, 0.5);
        }
        
        /* ===== 动态分色卡片 ===== */
        .cyber-goal-card {
            position: relative;
            border-radius: 2rem;
            padding: 2rem;
            margin: 1.5rem 0;
            overflow: hidden;
            min-height: 180px;
            background: rgba(0, 20, 40, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }
        
        /* 左侧霓虹进度层 - 使用科幻渐变 */
        .cyber-progress-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 0%;
            height: 100%;
            background: linear-gradient(145deg, 
                rgba(0, 255, 255, 0.9),
                rgba(0, 102, 255, 0.9));
            box-shadow: 
                0 0 30px rgba(0, 255, 255, 0.5),
                inset 0 0 30px rgba(255, 255, 255, 0.5);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }
        
        /* 右侧深色背景 */
        .cyber-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, 
                rgba(20, 30, 50, 0.9),
                rgba(10, 15, 30, 0.9));
            z-index: 0;
        }
        
        /* 卡片内容 */
        .cyber-card-content {
            position: relative;
            z-index: 2;
            color: white;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        /* 扫描线效果 */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                transparent 50%,
                rgba(0, 255, 255, 0.03) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 3;
            opacity: 0.3;
        }
        
        /* 数据网格 */
        .data-grid {
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        /* 霓虹按钮 */
        .cyber-button {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        
        .cyber-button:hover {
            background: var(--neon-cyan);
            color: var(--dark-bg);
            box-shadow: 0 0 30px var(--neon-cyan);
            transform: translateY(-2px);
        }
        
        .cyber-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .cyber-button:hover::before {
            left: 100%;
        }
        
        /* 霓虹输入框 */
        .cyber-input {
            background: rgba(0, 20, 40, 0.8) !important;
            border: 2px solid var(--neon-cyan) !important;
            color: white !important;
            font-size: 2.5rem !important;
            text-align: center;
            border-radius: 2rem !important;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2) !important;
            transition: all 0.3s ease;
        }
        
        .cyber-input:focus {
            box-shadow: 0 0 30px var(--neon-cyan) !important;
            border-color: var(--neon-pink) !important;
        }
        
        /* 进度条 */
        .cyber-progress {
            background: rgba(255,255,255,0.1);
            border-radius: 1rem;
            height: 8px;
            overflow: hidden;
            position: relative;
        }
        
        .cyber-progress-fill {
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-blue));
            height: 100%;
            border-radius: 1rem;
            box-shadow: 0 0 20px var(--neon-cyan);
            position: relative;
        }
        
        .cyber-progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent,
                rgba(255,255,255,0.3),
                transparent);
            animation: scan 2s linear infinite;
        }
        
        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        /* 头像 - 全息投影效果 */
        .hologram-avatar {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 0 20px var(--neon-cyan);
            position: relative;
            border: 2px solid rgba(255,255,255,0.5);
        }
        
        /* 菜单 - 科幻风格 */
        .cyber-dropdown {
            background: rgba(10, 20, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--neon-cyan);
            border-radius: 1rem;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }
        
        .cyber-dropdown-item {
            color: white;
            padding: 0.75rem 1rem;
            transition: all 0.3s;
        }
        
        .cyber-dropdown-item:hover {
            background: rgba(0, 255, 255, 0.2);
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }
        
        .cyber-dropdown-item.danger:hover {
            background: rgba(255, 0, 170, 0.2);
            color: var(--neon-pink);
        }
        
        /* 脉冲动画 */
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }
        
        /* 图表容器 - 全息效果 */
        .hologram-chart {
            background: rgba(10, 20, 40, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            position: relative;
        }
        
        /* 工具类 */
        .glow-text { text-shadow: 0 0 10px currentColor; }
        .border-glow { box-shadow: 0 0 20px rgba(0, 255, 255, 0.3); }
    </style>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="cyber-container">
        <!-- ===== 首次设置页面 ===== -->
        <div id="setup-page">
            <div class="glass-card p-5">
                <div class="has-text-centered mb-5">
                    <span class="is-size-1 neon-cyan pulse">⚡</span>
                    <h2 class="title is-3 neon-text">体重日记</h2>
                    <p class="subtitle is-6 has-text-grey-light">NEURAL INTERFACE v1.0</p>
                </div>
                
                <!-- 姓名 -->
                <div class="field">
                    <label class="label has-text-grey-light">姓名</label>
                    <div class="control">
                        <input class="input cyber-input" type="text" id="name" placeholder="输入姓名" value="张三" style="font-size: 1rem !important;">
                    </div>
                </div>
                
                <!-- 身高 -->
                <div class="field">
                    <label class="label has-text-grey-light">身高 (cm)</label>
                    <div class="control">
                        <input class="input cyber-input" type="number" id="height" min="100" max="250" step="1" value="172" style="font-size: 1rem !important;">
                    </div>
                </div>
                
                <!-- 当前体重 -->
                <div class="field">
                    <label class="label has-text-grey-light">当前体重 (kg)</label>
                    <div class="control">
                        <input class="input cyber-input" type="number" id="current-weight" min="30" max="200" step="0.1" value="87.6" style="font-size: 1rem !important;">
                    </div>
                </div>
                
                <!-- BMI滑块 -->
                <div class="field">
                    <label class="label has-text-grey-light">目标BMI</label>
                    <div class="is-flex is-justify-content-space-between mb-2">
                        <span class="has-text-grey-light">18.5</span>
                        <span class="neon-cyan" id="bmi-value">22.0</span>
                        <span class="has-text-grey-light">28.0</span>
                    </div>
                    <input type="range" id="bmi-slider" min="18.5" max="28" value="22" step="0.1" style="width: 100%; accent-color: #00ffff;">
                    
                    <!-- BMI区间标签 -->
                    <div class="is-flex is-justify-content-space-between mt-2">
                        <span style="color: #00ffff;">偏瘦</span>
                        <span style="color: #00ffaa;">正常</span>
                        <span style="color: #ffaa00;">偏胖</span>
                        <span style="color: #ff00aa;">肥胖</span>
                    </div>
                </div>
                
                <!-- 目标体重预览 -->
                <div class="glass-card p-4 my-4 has-text-centered">
                    <p class="has-text-grey-light mb-2">目标体重</p>
                    <p class="title is-2 neon-cyan" id="target-weight">65.08 kg</p>
                </div>
                
                <!-- 导入数据按钮 -->
                <button class="cyber-button is-fullwidth mb-3" id="import-btn">
                    <span>📡 导入数据</span>
                </button>
                <input type="file" id="import-file" accept=".json" style="display: none;">
                
                <!-- 开始记录按钮 -->
                <button class="cyber-button is-fullwidth" id="start-btn">
                    <span>🚀 启动系统</span>
                </button>
            </div>
        </div>
        
        <!-- ===== 主界面页面 ===== -->
        <div id="main-page" style="display: none;">
            <!-- 顶部用户栏 -->
            <nav class="level mb-4">
                <div class="level-left">
                    <div class="level-item">
                        <div class="hologram-avatar mr-3" id="avatar">张</div>
                        <div>
                            <div class="has-text-white" id="display-name">张三</div>
                            <div class="has-text-grey-light is-size-7" id="display-stats">172cm · 目标 65.1kg</div>
                        </div>
                    </div>
                </div>
                
                <div class="level-right">
                    <div class="dropdown" id="menu-dropdown">
                        <div class="dropdown-trigger">
                            <button class="cyber-button is-small" id="menu-toggle" style="padding: 0.5rem 1rem;">⋯</button>
                        </div>
                        <div class="dropdown-menu" id="dropdown-menu" style="display: none;">
                            <div class="dropdown-content cyber-dropdown">
                                <a class="dropdown-item cyber-dropdown-item" id="export-data">
                                    📤 导出数据
                                </a>
                                <a class="dropdown-item cyber-dropdown-item danger" id="clear-data">
                                    🗑️ 清除数据
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>
            
            <!-- ===== 科幻动态分色目标卡片 ===== -->
            <div class="cyber-goal-card" id="dynamic-goal-card">
                <!-- 扫描线效果 -->
                <div class="scan-line"></div>
                
                <!-- 右侧深色背景 -->
                <div class="cyber-bg"></div>
                
                <!-- 左侧霓虹进度层 -->
                <div class="cyber-progress-layer" id="progress-layer" style="width: 45%;"></div>
                
                <!-- 卡片内容 -->
                <div class="cyber-card-content">
                    <div>
                        <div class="is-flex is-justify-content-space-between is-align-items-center">
                            <span class="has-text-grey-light">今日目标</span>
                            <span class="title is-1 neon-text" id="today-goal" style="margin: 0;">86.40</span>
                        </div>
                        <span class="has-text-grey-light">kg</span>
                    </div>
                    
                    <div class="is-flex is-justify-content-space-between mt-4">
                        <span class="has-text-grey-light" id="start-weight">87.6 kg</span>
                        <span class="has-text-grey-light" id="target-weight-goal">65.1 kg</span>
                    </div>
                </div>
            </div>
            
            <!-- 录入卡片 -->
            <div class="glass-card p-5 my-4">
                <input type="number" step="any" id="weight-input" class="cyber-input" placeholder="0.0" autofocus>
                <p class="has-text-grey-light has-text-centered mt-3" id="today-count"></p>
            </div>
            
            <!-- 图表卡片 -->
            <div class="hologram-chart">
                <p class="has-text-grey-light mb-3" style="letter-spacing: 2px;">
                    <span class="neon-cyan">⏣</span> 神经接口数据流
                </p>
                <div style="height: 260px;">
                    <canvas id="weight-chart"></canvas>
                </div>
            </div>
        </div>
        
        <!-- ===== 清除确认模态框 ===== -->
        <div class="modal" id="clear-modal">
            <div class="modal-background"></div>
            <div class="modal-content">
                <div class="glass-card p-5 has-text-centered">
                    <h3 class="title is-4 neon-text mb-4">⚠️ 确认清除</h3>
                    <p class="has-text-grey-light mb-5">所有本地数据将被永久删除</p>
                    
                    <div class="is-flex is-justify-content-center gap-3">
                        <button class="cyber-button" id="modal-cancel" style="margin-right: 0.5rem;">取消</button>
                        <button class="cyber-button" id="modal-confirm" style="border-color: var(--neon-pink); color: var(--neon-pink);">清除</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ===== 核心数据 =====
            const STORAGE_KEY = 'weight_app_data';
            let appData = null;
            let chartInstance = null;
            
            // ===== DOM元素 =====
            const setupPage = document.getElementById('setup-page');
            const mainPage = document.getElementById('main-page');
            
            // 设置页
            const nameInput = document.getElementById('name');
            const heightInput = document.getElementById('height');
            const weightInput = document.getElementById('current-weight');
            const bmiSlider = document.getElementById('bmi-slider');
            const bmiValue = document.getElementById('bmi-value');
            const targetWeightSpan = document.getElementById('target-weight');
            const importBtn = document.getElementById('import-btn');
            const importFile = document.getElementById('import-file');
            const startBtn = document.getElementById('start-btn');
            
            // 主界面
            const avatar = document.getElementById('avatar');
            const displayName = document.getElementById('display-name');
            const displayStats = document.getElementById('display-stats');
            const todayGoal = document.getElementById('today-goal');
            const progressLayer = document.getElementById('progress-layer');
            const startWeight = document.getElementById('start-weight');
            const targetWeightGoal = document.getElementById('target-weight-goal');
            const weightInputMain = document.getElementById('weight-input');
            const todayCount = document.getElementById('today-count');
            
            // 菜单
            const menuToggle = document.getElementById('menu-toggle');
            const dropdownMenu = document.getElementById('dropdown-menu');
            const exportData = document.getElementById('export-data');
            const clearData = document.getElementById('clear-data');
            
            // 模态框
            const clearModal = document.getElementById('clear-modal');
            const modalCancel = document.getElementById('modal-cancel');
            const modalConfirm = document.getElementById('modal-confirm');
            
            // ===== 辅助函数 =====
            function showSetupPage() {
                setupPage.style.display = 'block';
                mainPage.style.display = 'none';
            }
            
            function showMainPage() {
                setupPage.style.display = 'none';
                mainPage.style.display = 'block';
                renderMainUI();
            }
            
            // 目标体重递推公式
            function nextGoal(prevGoal) {
                return prevGoal - (prevGoal * 0.0008 + 0.14) / 2;
            }
            
            // 获取某天的目标体重
            function getGoalForDate(dateStr, startDateStr, startGoal) {
                const start = new Date(startDateStr + 'T12:00:00');
                const target = new Date(dateStr + 'T12:00:00');
                const daysDiff = Math.round((target - start) / 86400000);
                
                if (daysDiff <= 0) return startGoal;
                
                let goal = startGoal;
                for (let i = 0; i < daysDiff; i++) {
                    goal = nextGoal(goal);
                }
                return goal;
            }
            
            // 获取首个记录日期
            function getFirstDate() {
                if (!appData?.progress) return null;
                for (const mk in appData.progress) {
                    for (const dk in appData.progress[mk]) {
                        return `${mk}-${dk.padStart(2, '0')}`;
                    }
                }
                return null;
            }
            
            // 获取今日日期键
            function getTodayKey() {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            }
            
            // 格式化日期显示
            function formatMD(dateStr) {
                const [, m, d] = dateStr.split('-');
                return `${Number(m)}/${Number(d)}`;
            }
            
            // 保存数据
            function persistData() {
                if (appData) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
                }
            }
            
            // 加载数据
            function loadFromStorage() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        if (parsed?.name && parsed?.height && parsed?.weight && parsed?.goal && parsed?.progress) {
                            appData = parsed;
                            return true;
                        }
                    } catch (e) {}
                }
                return false;
            }
            
            // ===== 设置页逻辑 =====
            function updateBMIPreview() {
                const bmi = parseFloat(bmiSlider.value);
                bmiValue.textContent = bmi.toFixed(1);
                
                const heightM = parseFloat(heightInput.value) / 100;
                const targetWeight = (bmi * heightM * heightM).toFixed(2);
                targetWeightSpan.textContent = targetWeight + ' kg';
            }
            
            heightInput.addEventListener('input', updateBMIPreview);
            bmiSlider.addEventListener('input', updateBMIPreview);
            updateBMIPreview();
            
            // 导入数据
            importBtn.addEventListener('click', () => {
                importFile.click();
            });
            
            importFile.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (!data.name || !data.height || !data.weight || !data.goal || !data.progress) {
                            throw new Error('格式错误');
                        }
                        appData = data;
                        persistData();
                        showMainPage();
                    } catch (err) {
                        alert('导入失败：' + err.message);
                    }
                };
                reader.readAsText(file);
            });
            
            // 开始记录
            startBtn.addEventListener('click', () => {
                if (!nameInput.value.trim()) {
                    alert('请输入姓名');
                    return;
                }
                
                const height = parseFloat(heightInput.value);
                const weight = parseFloat(weightInput.value);
                
                if (height < 100 || height > 250) {
                    alert('身高需在100-250cm之间');
                    return;
                }
                
                if (weight < 30 || weight > 200) {
                    alert('体重需在30-200kg之间');
                    return;
                }
                
                const bmi = parseFloat(bmiSlider.value);
                const heightM = height / 100;
                const goalWeight = bmi * heightM * heightM;
                
                // 初始化数据
                const today = new Date();
                const year = today.getFullYear();
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const day = String(today.getDate()).padStart(2, '0');
                const monthKey = `${year}-${month}`;
                const dayKey = String(today.getDate());
                
                appData = {
                    name: nameInput.value.trim(),
                    height: height,
                    weight: weight,
                    goal: goalWeight,
                    progress: {
                        [monthKey]: {
                            [dayKey]: [weight, weight]
                        }
                    }
                };
                
                persistData();
                showMainPage();
            });
            
            // ===== 主界面渲染 =====
            function getTodayData() {
                if (!appData) return null;
                
                const today = new Date();
                const year = today.getFullYear();
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const day = String(today.getDate()).padStart(2, '0');
                const monthKey = `${year}-${month}`;
                const dayKey = String(today.getDate());
                
                const record = appData.progress[monthKey]?.[dayKey];
                const firstDate = getFirstDate();
                
                const goal = firstDate ? 
                    getGoalForDate(`${year}-${month}-${day}`, firstDate, appData.weight) : 
                    appData.weight;
                
                let avg = null;
                let count = 0;
                
                if (record && record.length > 1) {
                    const weights = record.slice(1);
                    count = weights.length;
                    avg = weights.reduce((sum, w) => sum + w, 0) / count;
                }
                
                return { goal, avg, count };
            }
            
            function renderMainUI() {
                if (!appData) return;
                
                // 用户信息
                avatar.textContent = appData.name.charAt(0).toUpperCase();
                displayName.textContent = appData.name;
                displayStats.textContent = `${appData.height}cm · 目标 ${appData.goal.toFixed(1)}kg`;
                
                // 今日数据
                const today = getTodayData();
                if (today) {
                    todayGoal.textContent = today.goal.toFixed(2);
                    
                    // 进度计算
                    const current = today.avg !== null ? today.avg : appData.weight;
                    const start = appData.weight;
                    const target = appData.goal;
                    
                    let progress = 0;
                    if (start !== target) {
                        progress = ((start - current) / (start - target)) * 100;
                        progress = Math.min(100, Math.max(0, progress));
                    }
                    
                    // 更新左侧霓虹进度层宽度
                    if (progressLayer) {
                        progressLayer.style.width = progress + '%';
                    }
                    
                    startWeight.textContent = start.toFixed(1) + ' kg';
                    targetWeightGoal.textContent = target.toFixed(1) + ' kg';
                    
                    // 录入次数
                    if (today.count > 0) {
                        todayCount.textContent = `今日已记录 ${today.count} 次 · 平均 ${today.avg.toFixed(2)}kg`;
                    } else {
                        todayCount.textContent = '';
                    }
                }
                
                // 更新图表
                updateChart();
                
                // 聚焦输入框
                weightInputMain.focus();
            }
            
            // ===== 图表更新 =====
            function updateChart() {
                if (!appData) return;
                
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const firstDate = getFirstDate();
                
                const labels = [];
                const values = [];
                const colors = [];
                
                // 获取最近7天
                for (let i = 6; i >= 0; i--) {
                    const date = new Date(today);
                    date.setDate(date.getDate() - i);
                    
                    const year = date.getFullYear();
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    const monthKey = `${year}-${month}`;
                    const dayKey = String(date.getDate());
                    const dateKey = `${year}-${month}-${day}`;
                    
                    const record = appData.progress[monthKey]?.[dayKey];
                    const goal = firstDate ? getGoalForDate(dateKey, firstDate, appData.weight) : null;
                    
                    let avg = null;
                    if (record && record.length > 1) {
                        const weights = record.slice(1);
                        avg = weights.reduce((sum, w) => sum + w, 0) / weights.length;
                    }
                    
                    labels.push(formatMD(dateKey));
                    values.push(avg);
                    
                    if (avg !== null && goal !== null) {
                        colors.push(avg <= goal ? '#00ffaa' : '#ff00aa');
                    } else {
                        colors.push('#333333');
                    }
                }
                
                // 计算Y轴范围
                let base = 70;
                for (let val of values) {
                    if (val !== null) {
                        base = Math.round(val);
                        break;
                    }
                }
                
                const ctx = document.getElementById('weight-chart').getContext('2d');
                if (chartInstance) chartInstance.destroy();
                
                chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            backgroundColor: colors,
                            borderRadius: 8,
                            barPercentage: 0.6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(0,20,40,0.9)',
                                titleColor: '#00ffff',
                                bodyColor: 'white',
                                borderColor: '#00ffff',
                                borderWidth: 1
                            }
                        },
                        scales: {
                            y: {
                                min: base - 2,
                                max: base + 1,
                                grid: {
                                    color: 'rgba(0,255,255,0.1)',
                                },
                                ticks: {
                                    color: '#00ffff',
                                    stepSize: 0.5
                                }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: 'white' }
                            }
                        }
                    }
                });
            }
            
            // ===== 保存体重 =====
            function saveWeight() {
                if (!appData || !weightInputMain.value) return;
                
                const num = parseFloat(weightInputMain.value);
                if (isNaN(num) || num < 30 || num > 200) {
                    alert('请输入30-200之间的体重');
                    return;
                }
                
                const rounded = Math.round(num * 100) / 100;
                
                const today = new Date();
                const year = today.getFullYear();
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const day = String(today.getDate()).padStart(2, '0');
                const monthKey = `${year}-${month}`;
                const dayKey = String(today.getDate());
                
                if (!appData.progress[monthKey]) {
                    appData.progress[monthKey] = {};
                }
                
                const firstDate = getFirstDate();
                const todayGoal = firstDate ? 
                    getGoalForDate(`${year}-${month}-${day}`, firstDate, appData.weight) : 
                    appData.weight;
                
                if (!appData.progress[monthKey][dayKey]) {
                    appData.progress[monthKey][dayKey] = [todayGoal, rounded];
                } else {
                    appData.progress[monthKey][dayKey].push(rounded);
                }
                
                persistData();
                weightInputMain.value = '';
                renderMainUI();
            }
            
            weightInputMain.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    saveWeight();
                }
            });
            
            // ===== 菜单交互 =====
            menuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                if (dropdownMenu.style.display === 'none') {
                    dropdownMenu.style.display = 'block';
                } else {
                    dropdownMenu.style.display = 'none';
                }
            });
            
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#menu-dropdown')) {
                    dropdownMenu.style.display = 'none';
                }
            });
            
            // 导出数据
            exportData.addEventListener('click', () => {
                if (!appData) return;
                
                const dataStr = JSON.stringify(appData, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${appData.name}_weight_data.json`;
                a.click();
                URL.revokeObjectURL(url);
            });
            
            // 清除数据
            clearData.addEventListener('click', () => {
                clearModal.classList.add('is-active');
            });
            
            modalCancel.addEventListener('click', () => {
                clearModal.classList.remove('is-active');
            });
            
            modalConfirm.addEventListener('click', () => {
                localStorage.removeItem(STORAGE_KEY);
                appData = null;
                clearModal.classList.remove('is-active');
                showSetupPage();
            });
            
            // ===== 初始化 =====
            if (loadFromStorage()) {
                showMainPage();
            } else {
                showSetupPage();
            }
        })();
    </script>
</body>
</html>
