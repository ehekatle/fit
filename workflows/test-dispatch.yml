name: Test Write File

on:
  workflow_dispatch:  # 手动触发

jobs:
  test-write:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Create test file
        run: |
          # 创建目录
          mkdir -p docs/data/test
          
          # 创建一个简单的测试文件
          echo "测试时间: $(date)" > docs/data/test/test.txt
          echo "工作流运行成功!" >> docs/data/test/test.txt
          
          # 显示创建的文件
          echo "=== 创建的文件 ==="
          ls -la docs/data/test/
          echo "=== 文件内容 ==="
          cat docs/data/test/test.txt
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add docs/data/test/
          
          if git diff --staged --quiet; then
            echo "没有变化"
          else
            git commit -m "test: 创建测试文件"
            git push
            echo "✅ 文件已提交"
          fi
